<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
        <title>Exam Login</title>
        {% include 'applicant_navbar.html' %}
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body class="applicant">
        <div class="container mt-5">
        <h2>Applicant Exam Login</h2>
        <form method="POST" action="/exam_login" id="examLoginForm">
        <div class="mb-3">
        <label>Email</label>
        <input class="form-control" type="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
        <label>Exam Code</label>
        <input class="form-control" name="code" placeholder="Enter exam code" required>
        </div>
        <button class="btn btn-primary" type="submit">Enter Exam</button>
        <a href="/" class="btn btn-secondary">Back</a>
        </form>
        </div>
        <script>
        document.getElementById('examLoginForm').addEventListener('submit', function(event) {
            // Basic client-side check
            const email = document.querySelector('input[name="email"]').value;
            const code = document.querySelector('input[name="code"]').value;
            if (!email || !code) {
                alert('Please fill in all fields.');
                event.preventDefault();
            } else {
                alert('Logging into exam...');
            }
        });
        </script>
    </body>
</html>

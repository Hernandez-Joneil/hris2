<!DOCTYPE html>
<html>
    <head>

        <title>Create Exam</title>

        <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    </head>

    <body>

        {% include 'hr_navbar.html' %}

        <div class="container mt-5">

        <h2>Create Examination</h2>

        <form method="POST" action="/create_exam" id="createExamForm">

        <label>Exam Title</label>
        <input class="form-control mb-3"
        name="title"
        placeholder="Exam Title"
        required>


        <label>Exam Description</label>
        <textarea class="form-control mb-3"
        name="description"
        placeholder="Exam Description"
        required></textarea>


        <label>Exam Code (for applicants)</label>
        <input class="form-control mb-3"
        name="code"
        placeholder="Example: EXAM2025"
        required>


        <button class="btn btn-success" type="submit">
        Create Exam
        </button>

        <a href="/dashboard" class="btn btn-secondary">
        Back
        </a>

        </form>

        </div>

        <script>
        document.getElementById('createExamForm').addEventListener('submit', function(event) {
            // Basic client-side check
            const title = document.querySelector('input[name="title"]').value;
            const description = document.querySelector('textarea[name="description"]').value;
            const code = document.querySelector('input[name="code"]').value;
            if (!title || !description || !code) {
                alert('Please fill in all fields.');
                event.preventDefault();
            } else {
                alert('Creating exam...');
            }
        });
        </script>

    </body>
</html>

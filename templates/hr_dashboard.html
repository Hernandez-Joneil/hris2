<!DOCTYPE html>
<html>

    <head>

        <title>HR Dashboard</title>

        <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    </head>

    <body>

        {% include 'hr_navbar.html' %}

        <div class="container mt-5">

        <h2>HR Recruitment Dashboard</h2>

        <br>

        <a href="/create_exam" class="btn btn-primary">Create Exam</a>
        <a href="/schedule_exam" class="btn btn-success">Schedule Exam</a>
        <a href="/exam_portal" class="btn btn-warning">Applicant Exam Portal</a>
        <a href="/logout" class="btn btn-danger">Logout</a>

        <hr>

        <h3>Applicant Management</h3>

        <table class="table table-bordered">

        <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Resume</th>
        <th>Actions</th>
        </tr>

        {% for a in applicants %}

        <tr>

        <td>{{a[0]}}</td>
        <td>{{a[1]}}</td>
        <td>{{a[2]}}</td>
        <<td>{{a[3]}}</td> <!-- Status -->
        <td>
        <a href="/uploads/{{a[4]}}" class="btn btn-secondary btn-sm">
        Download
        </a>
        </td>


        <td>

        <a href="/update_status/{{a[0]}}/Qualified"
        class="btn btn-success btn-sm">
        Qualify
        </a>

        <a href="/update_status/{{a[0]}}/Rejected"
        class="btn btn-warning btn-sm">
        Reject
        </a>

        <a href="/delete_applicant/{{a[0]}}"
        class="btn btn-danger btn-sm"
        onclick="return confirm('Are you sure you want to delete this applicant?')">
        Delete
        </a>

        </td>

        </tr>

        {% endfor %}

        </table>


        </div>

    </body>

</html>
